<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Work | Srishti Enterprises</title>

<style>
/* ================= GLOBAL CONFIG & EXACT COLOR THEME ================= */
:root {
    --dark-navy: #091c33;      /* Image ka main background color */
    --topbar-bg: #05101e;      /* Sabse upar ka dark bar */
    --premium-gold: #ffd700;   /* Srishti Enterprises text color */
    --bright-yellow: #ffcc00;  /* Search button aur bottom Nav bar background */
    --nav-text: #05101e;       /* Nav buttons text color */
    --light-bg: #f5f5f5;
}

*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: var(--light-bg);
    color: #2d3748;
}

/* ================= EXACT HEADER DESIGN FROM IMAGE ================= */

/* 1. TOP BAR */
.top-bar {
    background: var(--topbar-bg);
    color: #ffffff;
    padding: 8px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: clamp(12px, 1.5vw, 14px);
    font-weight: bold;
}
.top-bar-left, .top-bar-right {
    display: flex;
    align-items: center;
    gap: 8px;
}

/* 2. MAIN HEADER */
.main-header {
    background: var(--dark-navy);
    padding: 20px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

.brand-logo {
    color: var(--bright-yellow);
    font-size: clamp(24px, 4vw, 36px);
    font-weight: 900;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-align: center;
}

/* 3. SEARCH BAR */
.search-container {
    width: 100%;
    max-width: 650px;
    display: flex;
    background: #ffffff;
    border-radius: 6px;
    overflow: hidden;
}

.search-input {
    flex: 1;
    border: none;
    padding: 12px 15px;
    font-size: 16px;
    outline: none;
    color: #4a5568;
}

.search-btn {
    background: var(--bright-yellow);
    border: none;
    color: var(--nav-text);
    padding: 0 25px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
}
.search-btn:hover {
    background: #e6b800;
}

/* 4. YELLOW NAVIGATION BAR */
.nav-bar {
    background: var(--bright-yellow);
    display: flex;
    justify-content: center;
    gap: clamp(10px, 3vw, 40px);
    padding: 12px 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.nav-bar a {
    text-decoration: none;
    color: var(--nav-text);
    font-weight: 900;
    font-size: clamp(13px, 2vw, 16px);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 4px 8px;
    transition: opacity 0.2s;
}

.nav-bar a:hover, .nav-bar a.active {
    opacity: 0.7;
}


/* ================= CONTENT & GRID LAYOUT ================= */
.main-content {
    padding: clamp(15px, 4vw, 40px);
}

h1.section-title {
    text-align: center;
    margin-bottom: clamp(25px, 5vw, 45px);
    color: var(--dark-navy);
    font-size: clamp(22px, 4vw, 32px);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 800;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(min(100%, 260px), 1fr));
    gap: clamp(15px, 3vw, 25px);
    max-width: 1200px;
    margin: auto;
}

.card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    border: 1px solid #e2e8f0;
    transition: all 0.4s ease;
    display: flex;
    flex-direction: column;
}

@media (hover: hover) {
    .card:hover {
        transform: translateY(-6px);
        border-color: var(--bright-yellow);
        box-shadow: 0 12px 25px rgba(0,0,0,0.1);
    }
    .card img:hover {
        transform: scale(1.04);
    }
}

.card-img-wrapper {
    width: 100%;
    overflow: hidden;
    background: #f1f5f9;
    aspect-ratio: 4 / 3; 
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    cursor: zoom-in;
    display: block;
    transition: transform 0.6s ease;
}

.title {
    padding: clamp(12px, 2vw, 18px) 15px;
    text-align: center;
    font-weight: 700;
    color: var(--dark-navy);
    text-transform: uppercase;
    font-size: clamp(13px, 1.8vw, 15px);
    border-top: 1px solid #edf2f7;
    margin-top: auto;
}

/* ================= LIGHTBOX (PURE FULL IMAGE VIEW) ================= */
.lightbox {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(5, 16, 30, 0.97); 
    z-index: 9999;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(8px);
    padding: 20px;
}

.lightbox-content-wrapper {
    position: relative;
    max-width: 100%;
    max-height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    animation: zoomIn 0.25s ease;
}

@keyframes zoomIn {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.lightbox img {
    max-width: 92vw;
    max-height: 82vh;
    display: block;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.6);
}

.close {
    position: absolute;
    top: -50px;
    right: 0;
    color: var(--bright-yellow);
    font-size: 45px;
    cursor: pointer;
    font-weight: bold;
    user-select: none;
    line-height: 1;
}

/* Mobile responsive fixes */
@media(max-width:768px){
.topbar { padding: 8px 12px; font-size: 11px; } /* Mobile side-by-side fix */
header { padding: 15px 10px; justify-content: center; gap: 10px; }
.logo { font-size: 22px; text-align: center; width: 100%; }
.search { max-width: 100%; width: 100%; margin: 5px 0; }
.search input { padding: 10px; font-size: 13px; }
.search button { padding: 0 15px; font-size: 13px; }
nav { padding: 10px 5px; overflow-x: auto; white-space: nowrap; display: flex; justify-content: flex-start; -webkit-overflow-scrolling: touch; }
nav a { margin: 0 12px; font-size: 13px; inline-size: max-content; }
.category-menu { gap: 8px; padding: 15px 10px 5px 10px; }
.category-btn { padding: 8px 16px; font-size: 13px; width: 47%; flex-grow: 1; text-align: center; }
.category-btn.btn-all { width: 100%; }
.gallery-container { padding: 15px 10px; }
.image-grid { grid-template-columns: repeat(auto-fit, minmax(145px, 1fr)); gap: 12px; }
.img-frame { padding: 8px; border-radius: 8px; }
.img-frame img { height: 160px; border-radius: 6px; }
.img-caption { font-size: 13px; margin-top: 8px; }
.fullscreen-close { top: 10px; right: 20px; font-size: 35px; }
}
</style>
</head>
<body>

<!-- TOP BAR (FROM IMAGE) -->
<div class="top-bar">
    <div class="top-bar-left">📍 Dwarka sec-1A</div>
    <div class="top-bar-right">📞 +91 9310444848</div>
</div>

<!-- MAIN HEADER BRAND & SEARCH (FROM IMAGE) -->
<div class="main-header">
    <div class="brand-logo">Srishti Enterprises</div>
    <div class="search-container">
        <input type="text" class="search-input" placeholder="Search products...">
        <button class="search-btn">Search</button>
    </div>
</div>

<!-- YELLOW NAVIGATION BAR (FROM IMAGE) -->
<div class="nav-bar">
    <a href="idex.html">HOME</a>
<a href="Products.html">PRODUCTS</a>
<!-- Ab yeh button direct aapki gallery kholega -->
<a href="our work.html#OUR">OUR WORK</a>
<a href="contcat.html">CONTACT</a>
</div>

<!-- MAIN GALLERY CONTENT -->
<div class="main-content">
    <h1 class="section-title">Our Frames Collection</h1>

    <div class="gallery">
        <div class="card">
            <div class="card-img-wrapper">
                <img src="frame1.jpg" alt="Premium Wooden Frame" onclick="openImage(this.src)">
            </div>
            <div class="title">Premium Wooden Frame</div>
        </div>

        <div class="card">
            <div class="card-img-wrapper">
                <img src="frame2.jpg" alt="Golden Decorative Frame" onclick="openImage(this.src)">
            </div>
            <div class="title">Golden Decorative Frame</div>
        </div>

        <div class="card">
            <div class="card-img-wrapper">
                <img src="frame3.jpg" alt="Luxury Wall Frame" onclick="openImage(this.src)">
            </div>
            <div class="title">Luxury Wall Frame</div>
        </div>

        <div class="card">
            <div class="card-img-wrapper">
                <img src="frame4.jpg" alt="Designer Frame" onclick="openImage(this.src)">
            </div>
            <div class="title">Designer Frame</div>
        </div>

        <div class="card">
            <div class="card-img-wrapper">
                <img src="frame5.jpg" alt="Custom Frame" onclick="openImage(this.src)">
            </div>
            <div class="title">Custom Frame</div>
        </div>

        <div class="card">
            <div class="card-img-wrapper">
                <img src="frame6.jpg" alt="Royal Frame" onclick="openImage(this.src)">
            </div>
            <div class="title">Royal Frame</div>
        </div>
    </div>
</div>

<!-- Lightbox Viewer Component -->
<div class="lightbox" id="lightbox" onclick="closeImage()">
    <div class="lightbox-content-wrapper" onclick="event.stopPropagation()">
        <span class="close" onclick="closeImage()">&times;</span>
        <img id="lightbox-img" src="" alt="Fullscreen Frame View">
    </div>
</div>

<script>
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

function openImage(src){
    lightboxImg.src = src;
    lightbox.style.display = "flex";
    document.body.style.overflow = "hidden"; /* Disables scrolling */
}

function closeImage(){
    lightbox.style.display = "none";
    document.body.style.overflow = "auto"; /* Re-enables scrolling */
    lightboxImg.src = "";
}

document.addEventListener("keydown", function(e){
    if(e.key === "Escape"){
        closeImage();
    }
});
</script>

</body>
</html>
